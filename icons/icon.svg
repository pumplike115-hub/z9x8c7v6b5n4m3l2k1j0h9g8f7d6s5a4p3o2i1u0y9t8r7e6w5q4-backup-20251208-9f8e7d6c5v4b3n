  <circle cx="256" cy="256" r="99" fill="none" stroke="url(#soft)" stroke-width="16" opacity=".82"/>
  <path d="M155 256c27-55 61-82 101-82s74 27 101 82c-27 55-61 82-101 82s-74-27-101-82Z" fill="#090914" stroke="url(#ring)" stroke-width="16" stroke-linejoin="round"/>
