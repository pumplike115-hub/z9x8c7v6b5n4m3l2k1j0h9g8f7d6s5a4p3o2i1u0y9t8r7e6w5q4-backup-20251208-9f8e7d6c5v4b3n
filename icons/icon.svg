<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">System Viewer icon</title>
  <desc id="desc">A dark rounded square with a luminous layered aperture mark.</desc>
  <defs>
    <radialGradient id="bg" cx="36%" cy="24%" r="86%">
      <stop offset="0" stop-color="#27233f"/>
