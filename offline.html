<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline | ไม่พบการเชื่อมต่อเครือข่าย</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050507;
            color: #ffffff;
            font-family: 'Prompt', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        /* Cosmic grid background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: -1;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(15, 15, 20, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(139, 92, 246, 0.1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }
        .icon-box svg {
            width: 38px;
            height: 38px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 0.95rem;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-retry {
            background: #8b5cf6;
            border: none;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            font-family: inherit;
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.6);
            filter: brightness(1.1);
        }
        .btn-retry:active {
            transform: translateY(0);
            box-shadow: 0 6px 15px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
                <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
                <path d="M12 18h.01"></path>
                <path d="M9.17 14.83a4 4 0 0 1 5.66 0"></path>
                <path d="M21.39 6.25A19.92 19.92 0 0 0 12 4a19.92 19.92 0 0 0-6.47 1.09"></path>
            </svg>
        </div>
        <h1>คุณกำลังออฟไลน์อยู่</h1>
        <p>ไม่พบการเชื่อมต่อเครือข่ายอินเทอร์เน็ต กรุณาตรวจสอบสัญญาณ Wi-Fi หรือข้อมูลมือถือของคุณ แล้วลองใหม่อีกครั้ง</p>
        <button class="btn-retry" onclick="window.location.reload()">ลองใหม่อีกครั้ง</button>
    </div>
</body>
</html>
